<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <header>
        <nav class="nav">
            <div class="divLogo">
                <img src="./assets/logo.png" alt="Logo" width="70px" height="75x">
            </div>
            <div class="divLinks">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="./index.html#sobre">Sobre</a></li>
                    <li><a href="">Sobre mim</a></li>
                    <li><a href="./cadastro.html"><img src="./assets/login.png" alt="Login" width="40px"></a></li>
                </ul>
            </div>
        </nav>
    </header>

    <div class="divContainerCadastro">
        <div class="divCadastro">
            <div class="divTitulo">
                <h1>Entre na sua conta</h1>
                <hr>
            </div>
            <div class="divInputs">
                <div class="divInput1">
                    <div class="inputBase">
                        <span>Nome de Usuário</span>
                        <input type="text" placeholder="Digite seu nome de usuário">
                    </div>
                </div>
                <div class="divInput2">
                    <div class="inputBase">
                        <span>Email</span>
                        <input type="text" placeholder="Digite seu email">
                    </div>
                </div>
                <div class="divInput2">
                    <div class="inputBase">
                        <span>Senha</span>
                        <input type="password" placeholder="Digite sua senha">
                    </div>
                </div>
                <div class="divLogin">
                    <p>Não possui um cadastro? <span><a href="./login.html">Fazer Cadastro</a></span></p>
                </div>
                <div class="divButtonEntrar">
                    <button>Entrar</button>
                </div>
            </div>
        </div>
    </div>

    <footer>

    </footer>
</body>
</html>
