<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeriesTV | Login</title>
    <link rel="stylesheet" href="./css/estilo.css">
</head>

<body>
    <header>
        <nav class="nav">
            <div class="divLogo">
                <img src="./assets/logo.png" alt="Logo" width="70px" height="75x">
            </div>
            <div class="divLinks">
                <ul>
                    <li><a href="./index.html">Home</a></li>
                    <li><a href="./index.html#sobre">Sobre</a></li>
                    <li><a href="./index.html#sobreMim">Sobre Mim</a></li>
                    <li><a href="./simulador.html"><button class="buttonBanner">Simulador</button></a></li>
                    <li><a href="./cadastro.html"><img src="./assets/login.png" alt="Login" width="40px"></a></li>
                </ul>
            </div>
        </nav>
    </header>

    <div class="divContainerLogin">
        <div class="imgBannerLogin">
            <img src="./assets/seriesBackground.png" alt="">
        </div>

        <div class="divLogin">
            <div class="divTitulo">
                <h1>Bem-vindo de Volta</h1>
                <hr>
            </div>
            <div class="divInputs">
                <div class="divInput1">
                    <div class="inputBase">
                        <span>Nome de Usuário</span>
                        <input id="nome_de_usuario_input" type="text" placeholder="Digite seu nome de usuário">
                        <div class="alerta_erro_login">
                            <div class="card_erro_login" id="cardErroLoginNome">
                                <span id="mensagem_erro_login_nome"></span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="divInput2">
                    <div class="inputBase">
                        <span>Senha</span>
                        <input id="senha_input" type="password" placeholder="Digite sua senha">
                        <div class="alerta_erro_login">
                            <div class="card_erro_login" id="cardErroLoginSenha">
                                <span id="mensagem_erro_login_senha"></span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="divIrParaCadastro">
                    <p>Não possui um cadastro? <span><a href="./cadastro.html">Fazer Cadastro</a></span></p>
                </div>
                <div class="divButtonEntrar">
                    <button onclick="entrar()">Entrar</button>
                </div>
            </div>
        </div>
    </div>
</body>

</html>

<script>
    function entrar() {

        var nomeDeUsuarioVar = nome_de_usuario_input.value;
        var senhaVar = senha_input.value;

        var nomeInvalido = false;
        var senhaInvalida = false;

        if (nomeDeUsuarioVar == "" && senhaVar == "") {
            mostrarErro('Nome de Usuário e Senha Inválidos');
            nomeInvalido = true;
        }

        if (nomeInvalido || senhaInvalida) {
            return false;
        }

        console.log("FORM LOGIN: ", nomeDeUsuarioVar);
        console.log("FORM SENHA: ", senhaVar);

        fetch("/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                nomeDeUsuarioServer: nomeDeUsuarioVar,
                senhaServer: senhaVar
            })
        }).then(function (resposta) {
            console.log("ESTOU NO THEN DO entrar()!")

            if (resposta.ok) {
                console.log(resposta);

                resposta.json().then(json => {
                    sessionStorage.NOME_USUARIO = json.nome_usuario;
                    sessionStorage.NOME_DE_USUARIO = json.nome_de_usuario;
                    sessionStorage.EMAIL_USUARIO = json.email;
                    sessionStorage.TELEFONE_USUARIO = json.telefone;
                    sessionStorage.IMAGEM_USUARIO = json.imagem_usuario;
                    sessionStorage.ID_USUARIO = json.id_usuario;

                    window.location = "logado/perfil.html";
                });

            } else {
                console.log("Houve um erro ao tentar realizar o login!");
            }

        }).catch(function (erro) {
            console.log(erro);
        })

        return false;
    }

</script>
