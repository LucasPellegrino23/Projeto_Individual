<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SeriesTV | Cadastro</title>
  <link rel="stylesheet" href="./css/estilo.css">

  <script src="./js/sessao.js"></script>
</head>

<body>
  <header>
    <nav class="nav">
      <div class="divLogo">
        <img src="./assets/logo.png" alt="Logo" width="70px" height="75x">
      </div>
      <div class="divLinks">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="./index.html#sobre">Sobre</a></li>
          <li><a href="./index.html#sobreMim">Sobre Mim</a></li>
          <li><a href="./simulador.html"><button class="buttonBanner">Simulador</button></a></li>
          <li><a href="./cadastro.html"><img src="./assets/login.png" alt="Login" width="40px"></a></li>
        </ul>
      </div>
    </nav>
  </header>

  <div class="divContainerCadastro">
    <div class="imgBannerCadastro">
      <img src="./assets/seriesBackground.png" alt="">
    </div>

    <div class="divCadastro">
      <div class="divTitulo">
        <h1>Cadastre-se</h1>
        <hr>
      </div>
      <div class="divInputs">
        <div class="divInput1">
          <div class="inputBase">
            <span>Nome</span>
            <input id="nome_input" type="text" placeholder="Digite seu nome">
            <div class="alerta_erro">
              <div class="card_erro" id="cardErroNome">
                <span id="mensagem_erro_nome"></span>
              </div>
            </div>
          </div>
          <div class="inputBase">
            <span>Nome de Usuário</span>
            <input id="nome_de_usuario_input" type="text" placeholder="Digite seu nome de usuário">
            <div class="alerta_erro">
              <div class="card_erro" id="cardErroNomeDeUsuario">
                <span id="mensagem_erro_nome_de_usuario"></span>
              </div>
            </div>
          </div>
        </div>
        <div class="divInput2">
          <div class="inputBase">
            <span>Email</span>
            <input id="email_input" type="text" placeholder="name@example.example">
            <div class="alerta_erro">
              <div class="card_erro" id="cardErroEmail">
                <span id="mensagem_erro_email"></span>
              </div>
            </div>
          </div>
          <div class="inputBase">
            <span>Telefone</span>
            <input id="telefone_input" type="text" placeholder="11999999999">
            <div class="alerta_erro">
              <div class="card_erro" id="cardErroTelefone">
                <span id="mensagem_erro_telefone"></span>
              </div>
            </div>
          </div>
        </div>
        <div class="divInput3">
          <div class="inputBase">
            <span>Senha</span>
            <input id="senha_input" type="password" placeholder="Digite uma senha forte">
            <div class="alerta_erro">
              <div class="card_erro" id="cardErroSenha">
                <span id="mensagem_erro_senha"></span>
              </div>
            </div>
          </div>
          <div class="inputBase">
            <span>Confirmar Senha</span>
            <input id="confirmacao_senha_input" type="password" placeholder="Digite uma senha forte">
            <div class="alerta_erro">
              <div class="card_erro" id="cardErroConfirmacaoSenha">
                <span id="mensagem_erro_confirmacao_senha"></span>
              </div>
            </div>
          </div>
        </div>
        <div class="divInput4">
          <div class="inputBase">
            <span>Link de endereço da sua Imagem</span>
            <input oninput="verificarFoto()" id="imagem_input" type="url" placeholder="https://exemplo.com">
            <div class="alerta_erro">
              <div class="card_erro" id="cardErroImagem">
                <span id="mensagem_erro_imagem"></span>
              </div>
            </div>
          </div>
        </div>
        <div>
          <div id="imagemUsuario" class="imagemUsuario">
        </div>
        </div>
        <div class="divIrParaLogin">
          <p>Já possui uma conta? <span><a href="./login.html">Fazer Login</a></span></p>
        </div>
        <div class="divButtonEntrar">
          <button onclick="cadastrar()">Cadastrar</button>
        </div>
      </div>
    </div>
  </div>
</body>

</html>

<script>
  function mostrarErro(spanId, cardId, mensagem) {
    document.getElementById(spanId).innerHTML = mensagem;
    document.getElementById(cardId).style.display = 'block';
  }

  function verificarFoto(){
    let imagemVar = imagem_input.value;

    if(imagemVar == '' || !imagemVar.startsWith('https://')){
      imagemUsuario.innerHTML = `<img src="https://cdn-icons-png.flaticon.com/512/9972/9972749.png" alt="Imagem de Erro">`;
    } else{
      imagemUsuario.innerHTML = `<img src="${imagemVar}" alt="Imagem do Usuário">`;
    }
  }

  function cadastrar() {
    var nomeVar = nome_input.value;
    var nomeDeUsuarioVar = nome_de_usuario_input.value;
    var emailVar = email_input.value;
    var telefoneVar = telefone_input.value;
    var imagemVar = imagem_input.value;
    var senhaVar = senha_input.value;
    var confirmacaoSenhaVar = confirmacao_senha_input.value;

    var numeros = [1, 2, 3, 4, 5, 6, 7, 8, 9, 0];
    var listaCaracteresEspeciais = [
      '!', '#', '$', '%', '&', '*',
      '+', '-', '.', '/', ':', ';', '<', '=', '>',
      '?', '@', '[', '\\', ']', '_', '{', '|',
      '}'
    ];

    var imagemInvalida = 0;
    if(imagemVar == ''){
      imagemInvalida++;
      
      if (imagemInvalida > 0) {
        mostrarErro('mensagem_erro_imagem', 'cardErroImagem', 'Imagem Inválida');
      } else {
        mostrarErro('mensagem_erro_imagem', 'cardErroImagem', 'Imagem Válido');
      }
    } else {
      mostrarErro('mensagem_erro_imagem', 'cardErroImagem', 'Imagem Válido');
    }

    var nomeInvalido = 0;
    if (nomeVar !== '' && !nomeVar[0].includes(' ')) {
      for (let i = 0; i < nomeVar.length; i++) {
        if (nomeVar[i] == numeros[i]) {
          nomeInvalido++;
        }
        if (nomeVar[i].toUpperCase() == nomeVar[i].toLowerCase()) {
          if (!nomeVar[i].includes(' ')) {
            nomeInvalido++;
          }
        }
      }
      if (nomeInvalido > 0) {
        mostrarErro('mensagem_erro_nome', 'cardErroNome', 'Nome Inválido');
      } else {
        mostrarErro('mensagem_erro_nome', 'cardErroNome', 'Nome Válido');
      }
    } else {
      nomeInvalido++;
      mostrarErro('mensagem_erro_nome', 'cardErroNome', 'Nome Inválido');
    }

    var nomeDeUsuarioInvalido = 0;
    if (nomeDeUsuarioVar !== '' && !nomeDeUsuarioVar[0].includes(' ')) {
      for (let i = 0; i < nomeDeUsuarioVar.length; i++) {
        if (nomeDeUsuarioVar[i] == numeros[i]) {
          nomeDeUsuarioInvalido++;
        }
        if (nomeDeUsuarioVar[i].toUpperCase() == nomeDeUsuarioVar[i].toLowerCase()) {
          if (nomeDeUsuarioVar[i].includes(' ')) {
            nomeDeUsuarioInvalido++;
          }
        }
      }
      if (nomeDeUsuarioInvalido > 0) {
        mostrarErro('mensagem_erro_nome_de_usuario', 'cardErroNomeDeUsuario', 'Nome de Usuário Inválido');
      } else {
        mostrarErro('mensagem_erro_nome_de_usuario', 'cardErroNomeDeUsuario', 'Nome de Usuário Válido');
      }
    } else {
      nomeDeUsuarioInvalido++;
      mostrarErro('mensagem_erro_nome_de_usuario', 'cardErroNomeDeUsuario', 'Nome de Usuário Inválido');
    }

    var emailInvalido = 0;
    if (emailVar.includes('@') && emailVar.includes('.') && !emailVar.includes(' ')) {
      mostrarErro('mensagem_erro_email', 'cardErroEmail', 'Email Válido');
    } else {
      emailInvalido++;
      mostrarErro('mensagem_erro_email', 'cardErroEmail', 'Email Inválido');
    }

    var telefoneCerto = 0;
    if (telefoneVar != '' && telefoneVar.length == 11) {
      for (let i = 0; i < telefoneVar.length; i++) {
        for (let j = 0; j < numeros.length; j++) {
          if (telefoneVar[i] == numeros[j]) {
            telefoneCerto++;
          }
        }
      }
      if (telefoneCerto > 0) {
        mostrarErro('mensagem_erro_telefone', 'cardErroTelefone', 'Telefone Válido');
      } else {
        mostrarErro('mensagem_erro_telefone', 'cardErroTelefone', 'Telefone Inválido');
      }
    } else {
      mostrarErro('mensagem_erro_telefone', 'cardErroTelefone', 'Telefone Inválido');
    }

    var senhaCerto = 0;
    if (senhaVar != '' && !senhaVar.includes(' ') && senhaVar.length >= 8) {
      for (let i = 0; i < listaCaracteresEspeciais.length; i++) {
        if (senhaVar.includes(listaCaracteresEspeciais[i])) {
          senhaCerto++;
        }
      }
      if (senhaCerto > 0) {
        mostrarErro('mensagem_erro_senha', 'cardErroSenha', 'Senha Válida');
      } else {
        mostrarErro('mensagem_erro_senha', 'cardErroSenha', 'Senha Inválida');
      }
    } else {
      mostrarErro('mensagem_erro_senha', 'cardErroSenha', 'Senha Inválida');
    }

    if (confirmacaoSenhaVar !== senhaVar || confirmacaoSenhaVar === '') {
      mostrarErro('mensagem_erro_confirmacao_senha', 'cardErroConfirmacaoSenha', 'As senhas não são iguais');
    } else {
      mostrarErro('mensagem_erro_confirmacao_senha', 'cardErroConfirmacaoSenha', 'Senhas Iguais');
    }

    if (nomeInvalido == 0 && nomeDeUsuarioInvalido == 0 && emailInvalido == 0 && telefoneCerto > 0 && senhaCerto > 0 && senhaVar === confirmacaoSenhaVar && imagemInvalida == 0) {
      fetch("/usuarios/cadastrar", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
        },
        body: JSON.stringify({
          nomeServer: nomeVar,
          nomeDeUsuarioServer: nomeDeUsuarioVar,
          emailServer: emailVar,
          telefoneServer: telefoneVar,
          senhaServer: senhaVar,
          imagemServer: imagemVar,
        }),
      })
        .then(function (resposta) {
          console.log("resposta: ", resposta);

          if (resposta.ok) {
            alert("Cadastro realizado com sucesso! Redirecionando para tela de Login...");

            setTimeout(() => {
              window.location = "login.html";
            }, "500");

          } else {
            throw "Houve um erro ao tentar realizar o cadastro!";
          }
        })
        .catch(function (resposta) {
          console.log(`#ERRO: ${resposta}`);
        });

      return false;
    }
  }
</script>
