<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliar Séries</title>

    <link rel="stylesheet" href="../css/styleLogador.css">
    <script src="../js/sessao.js"></script>
    <script src="../js/alerta.js"></script>
</head>

<body onload="validarSessao()">
    <div class="containerPagina">
        <div class="navegacao">
            <div class="divLogo">
                <img src="../assets/logo.png" alt="Logo SeriesTv">
            </div>
            <h3 class="h3Ola">Olá, <span id="b_usuario"></span>!</h3>

            <div class="divLinks">
                <button><a class="links" href="./perfil.html">Perfil do Usuário</a></button>
                <button class="ative"><a class="links" href="./avaliar.html">Avaliar Séries</a></button>
                <button><a class="links" href="./dashboard.html">Dashboard</a></button>
                <button><a class="links" href="./avaliacoes.html">Avaliações</a></button>
                <h3 onclick="limparSessao()"><a href="../index.html">Sair</a></h3>
            </div>
        </div>

        <div class="formularioSerie">
            <div class="cadastroSerie">
                <div class="tituloSerie">
                    <h1>Cadastre uma série</h1>
                </div>
                <div class="inputSerie1">
                    <div class="inputBaseSerie">
                        <span>Nome da Série</span>
                        <input id="nome_serie_input" type="text" placeholder="Digite o nome da série">
                        <div class="alerta_erro">
                            <div class="card_erro" id="cardErroNomeSerie">
                                <span id="mensagem_erro_nome_serie"></span>
                            </div>
                        </div>
                    </div>
                    <div class="inputBaseSerie">
                        <span>Gênero</span>
                        <input id="genero_input" type="text" placeholder="Digite o gênero da série">
                        <div class="alerta_erro">
                            <div class="card_erro" id="cardErroGenero">
                                <span id="mensagem_erro_genero_serie"></span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="inputSerie2">
                    <div class="inputBaseSerie">
                        <span>Status da Série</span>
                        <select id="select_status_serie">
                            <option value="#" disabled selected>Selecione uma opção</option>
                            <option value="assistido">Assistido</option>
                            <option value="assistindo">Assistindo</option>
                        </select>
                        <div class="alerta_erro">
                            <div class="card_erro" id="cardErroNomeSerie">
                                <span id="mensagem_erro_nome_serie"></span>
                            </div>
                        </div>
                    </div>
                    <div class="inputBaseSerie">
                        <span>Quantidade de Episódios</span>
                        <input id="qtd_eps_input" type="number" placeholder="Digite a quantidade de episódios da série">
                        <div class="alerta_erro">
                            <div class="card_erro" id="cardErroQuantidade">
                                <span id="mensagem_erro_qtd_serie"></span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="inputSerie3">
                    <div class="inputSinopseSerie">
                        <span>Sinopse</span>
                        <textarea id="sinopse_input" type="text" placeholder="Digite a sinopse da série"></textarea>
                        <div class="alerta_erro">
                            <div class="card_erro" id="cardErroNomeSinopse">
                                <span id="mensagem_erro_sinopse_serie"></span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="inputSerie4">
                    <div class="inputImagemSerie">
                        <span>Link da Imagem da Série</span>
                        <input oninput="verificarFoto()" id="imagem_serie_input" type="url"
                            placeholder="https://exemplo.com">
                        <div class="alerta_erro">
                            <div class="card_erro" id="cardErroImagemSerie">
                                <span id="mensagem_erro_imagem_serie"></span>
                            </div>
                        </div>
                    </div>
                    <div>
                        <div id="imagemSerie" class="imagemSerie">
                        </div>
                    </div>
                </div>

                <div class="tituloSerie2">
                    <h1>Avaliação</h1>
                </div>

                <div class="inputSerie5">
                    <div class="inputAvaliacaoSerie">
                        <span>Avaliação</span>
                        <textarea id="avaliacao_input" type="text" placeholder="Digite a avaliação da série"></textarea>
                        <div class="alerta_erro">
                            <div class="card_erro" id="cardErroNomeAvaliacao">
                                <span id="mensagem_erro_avaliacao_serie"></span>
                            </div>
                        </div>
                    </div>
                    <div class="inputBaseSerie">
                        <span>Nota da Série</span>
                        <input id="nota_serie_input" type="number" placeholder="0.0">
                        <div class="alerta_erro">
                            <div class="card_erro" id="cardErroNotaSerie">
                                <span id="mensagem_erro_nota_serie"></span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="buttonSerie">
                    <button onclick="cadastrar()">Cadastrar Série</button>
                </div>
            </div>
        </div>
    </div>
</body>

</html>

<script>

    function mostrarErro(spanId, cardId, mensagem) {
        document.getElementById(spanId).innerHTML = mensagem;
        document.getElementById(cardId).style.display = 'block';
    }

    function limparErros() {
        document.querySelectorAll('.card_erro').forEach(card => {
            card.style.display = 'none';
        });
        document.querySelectorAll('.card_erro span').forEach(span => {
            span.innerHTML = '';
        });
    }

    function verificarFoto() {
        let imagemSerieVar = imagem_serie_input.value;

        if (imagemSerieVar == '' || !imagemSerieVar.startsWith('https://')) {
            imagemSerie.innerHTML = `<img src="https://cdn-icons-png.flaticon.com/512/9972/9972749.png" alt="Imagem do Usuário">`;
        } else {
            imagemSerie.innerHTML = `<img src="${imagemSerieVar}" alt="Imagem da Série">`;
        }
    }

    function validarSessao() {
        var nome = sessionStorage.NOME_USUARIO;


        var b_usuario = document.getElementById("b_usuario");

        if (nome != null) {
            b_usuario.innerHTML = nome;
        } else {
            window.location = "../login.html";
        }
    }
