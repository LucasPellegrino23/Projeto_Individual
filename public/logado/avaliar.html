<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeriesTV | Avaliar Séries</title>

    <link rel="stylesheet" href="../css/styleLogador.css">
    <script src="../js/sessao.js"></script>
    <script src="../js/alerta.js"></script>
</head>

<body onload="validarSessao()">
    <div class="containerPagina">
        <div class="navegacao">
            <div class="divLogo">
                <img src="../assets/logo.png" alt="Logo SeriesTv">
            </div>
            <h3 class="h3Ola">Olá, <span id="b_usuario"></span>!</h3>

            <div class="divLinks">
                <button><a class="links" href="./perfil.html">Perfil do Usuário</a></button>
                <button class="ative"><a class="links" href="./cadastrarSerie.html">Avaliar Séries</a></button>
                <button><a class="links" href="./dashboard.html">Dashboard</a></button>
                <button><a class="links" href="./avaliacoes.html">Avaliações</a></button>
                <h3 onclick="limparSessao()"><a href="../index.html">Sair</a></h3>
            </div>
        </div>

        <div class="formularioSerie">
            <div class="cadastroSerie">

                <div class="tituloSerie2">
                    <h1>Avalie uma série</h1>
                </div>

                <div class="inputSerie5">
                    <div class="inputAvaliacaoSerie">
                        <span>Avaliação</span>
                        <textarea id="avaliacao_input" type="text" placeholder="Digite a avaliação da série"></textarea>
                        <div class="alerta_erro">
                            <div class="card_erro" id="cardErroNomeAvaliacao">
                                <span id="mensagem_erro_avaliacao_serie"></span>
                            </div>
                        </div>
                    </div>
                    <div class="inputBaseSerieNota">
                        <span>Nota da Série</span>
                        <input id="nota_serie_input" type="number" placeholder="0.0">
                        <div class="alerta_erro">
                            <div class="card_erro" id="cardErroNotaSerie">
                                <span id="mensagem_erro_nota_serie"></span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="buttonSerie">
                    <button onclick="avaliar()">Avaliar Série</button>
                </div>
            </div>
        </div>
    </div>
</body>

</html>

<script>

    function validarSessao() {
        var nome = sessionStorage.NOME_USUARIO;
        b_usuario.innerHTML = nome;
    }

    function avaliar() {
        var avaliacaoVar = avaliacao_input.value;
        var notaVar = nota_serie_input.value;
        var idUsuarioVar = sessionStorage.ID_USUARIO;
        var fkSerieVar = sessionStorage.ID_SERIE;
        var nomeSerieVar = sessionStorage.NOME_SERIE

        console.log("fkSerie do sessionStorage:", fkSerieVar);

        var numeros = [1, 2, 3, 4, 5, 6, 7, 8, 9, 0];

        if (avaliacaoVar !== '' && notaVar !== '') {
            fetch("/series/avaliarSerie", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                },
                body: JSON.stringify({
                    avaliacaoServer: avaliacaoVar,
                    notaServer: notaVar,
                    idUsuarioServer: idUsuarioVar,
                    fkSerieServer: fkSerieVar,
                    nomeDaSerieServer: nomeSerieVar
                }),
            })
                .then(function (resposta) {
                    console.log("resposta status: ", resposta.status);

                    if (resposta.ok) {
                        console.log(resposta);
                        resposta.json().then(json => {
                            sessionStorage.NOME_SERIE = json.nome_serie;
                        });
                    }

                    if (resposta.ok) {
                        alert("Avaliação de Série realizada com sucesso! Redirecionando para tela da Dashboard...");
                        setTimeout(() => {
                            window.location = "dashboard.html";
                        }, "500");
                    } else {
                        throw "Houve um erro ao tentar realizar a avaliação de série!";
                    }
                })
                .catch(function (resposta) {
                    console.log(`#ERRO: ${resposta}`);
                });

            return false;
        }
    }

</script>
