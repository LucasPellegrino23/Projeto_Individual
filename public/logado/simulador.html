<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SeriesTV | Simulador</title>

    <script src="./js/sessao.js"></script>

    <link rel="stylesheet" href="../css/styleLogador.css">
    <link rel="icon" href="./assets/icon/favicon2.ico">
    <link rel="preconnect" href="https://fonts.gstatic.com">
</head>

<body onload="validarSessao()">
    <div class="containerPagina">
        <div class="navegacao">
            <div class="divLogo">
                <img src="../assets/logo.png" alt="Logo SeriesTv">
            </div>
            <h3 class="h3Ola">Olá, <span id="b_usuario"></span>!</h3>

            <div class="divLinks">
                <a class="links" href="./perfil.html"><button>Perfil do Usuário</button></a>
                <a href="./avaliarExistente.html" class="links"><button>Avaliar Séries Existentes</button></a>
                <a class="links" href="./cadastrarSerie.html"><button>Cadastrar Séries</button></a>
                <a class="links" href="./dashboard.html"><button>Dashboard</button></a>
                <a class="links" href="./avaliacoesAcao.html"><button>Avaliações</button></a>
                <a class="links" href="./simulador.html"><button class="ative">Simulador de Séries</button></a>
                <h3 onclick="limparSessao()"><a href="../index.html">Sair</a></h3>
            </div>
        </div>

        <div class="containerSimulador">
            <div class="simulacao">
                <h1>Simulador de Séries que queira assistir</h1>
                <hr>

                <div class="divInputsSimulador">
                    <h3>Nome Série:</h3>
                    <input type="text" id="ipt_nome_serie">
                </div>
                <div class="divInputsSimulador">
                    <h3>Quantidade de Episódios:</h3>
                    <input type="text" id="ipt_qtd_eps">
                </div>
                <div class="divInputsSimulador">
                    <h3>Tempo Médio dos Episódios (em minutos):</h3>
                    <input type="text" id="ipt_tempo_medio_eps">
                </div>
                <div class="divInputsSimulador">
                    <h3>Em quantas semanas você quer terminar a série:</h3>
                    <input type="text" id="ipt_qtd_semanas">
                </div>

                <button onclick="simular()">Simular</button>

                <div id="div_msg"></div>
            </div>

            <p>Vale Ressaltar que esse simulador, não é 100% preciso, sendo uma previsão de  <br> tempo que será gasto na série.</p>
        </div>
    </div>
</body>

</html>
<script>
    function validarSessao() {
        var nome = sessionStorage.NOME_USUARIO;
        b_usuario.innerHTML = nome;
    }


    function simular(){
        let nomeSerie = ipt_nome_serie.value;
        let qtdEpisodios = Number(ipt_qtd_eps.value);
        let tempoMedio = Number(ipt_tempo_medio_eps.value);
        let qtdSemanas = Number(ipt_qtd_semanas.value);

        let totalMinutos = qtdEpisodios * tempoMedio;

        let totalMinutosSemanas = (totalMinutos / qtdSemanas);

        let totalMinutosDia = totalMinutosSemanas / 7;

        let totalEpsDia = totalMinutosDia / tempoMedio;

        div_msg.innerHTML = `Para assistir a série ${nomeSerie}, você tem que assitir aproximadamente <span class="span_msg">${totalEpsDia.toFixed(2)}</span> episódio(s) por dia para terminar em <span class="span_msg">${qtdSemanas}</span> semanas`;
    }
</script>
