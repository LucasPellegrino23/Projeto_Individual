<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeriesTV | Séries Avaliadas</title>

    <link rel="stylesheet" href="../css/styleLogador.css">
    <script src="../js/sessao.js"></script>
    <link rel="icon" href="assets/logo.png" width="0.01px">
</head>

<body>
    <div class="containerPagina">
        <div class="navegacao">
            <div class="divLogo">
                <img src="../assets/logo.png" alt="Logo SeriesTv">
            </div>
            <h3 class="h3Ola">Olá, <span id="b_usuario"></span>!</h3>

            <div class="divLinks">
                <a class="links" href="./perfil.html"><button>Perfil do Usuário</button></a>
                <a href="./avaliarExistente.html" class="links"><button>Avaliar Séries Existentes</button></a>
                <a class="links" href="./cadastrarSerie.html"><button>Cadastrar Séries</button></a>
                <a class="links" href="./dashboard.html"><button>Dashboard</button></a>
                <a class="links" href="./avaliacoesAcao.html"><button class="ative">Avaliações</button></a>
                <a class="links" href="./simulador.html"><button>Simulador de Séries</button></a>
                <h3 onclick="limparSessao()"><a href="../index.html">Sair</a></h3>
            </div>
        </div>

        <div class="containerAvaliacoes">
            <h1 class="tituloAvaliacoes">Avaliações Séries de Ficção Científica</h1>
            <div class="buttonsAvaliacoes">
                <a class="linksAvaliacoes" href="./avaliacoesAcao.html"><button>Ação</button></a>
                <a class="linksAvaliacoes" href="./avaliacoesTerror.html"><button>Terror</button></a>
                <a class="linksAvaliacoes" href="./avaliacoesComedia.html"><button>Comédia</button></a>
                <a class="linksAvaliacoes" href="./avaliacoesSerialKiller.html"><button>Serial Killer</button></a>
                <a class="linksAvaliacoes" href="./avaliacoesDorama.html"><button>Dorama</button></a>
                <a class="linksAvaliacoes" href="./avaliacoesFiccao.html"><button>Ficção</button></a>
                <a class="linksAvaliacoes" href="./avaliacoesFiccaoCientifica.html"><button class="ativeAvaliacoes">Ficção Científica</button></a>
                <a class="linksAvaliacoes" href="./avaliacoesSuspense.html"><button>Suspense</button></a>
            </div>
            <div class="avaliacoes" id="avaliacoes">

            </div>
        </div>
    </div>
</body>

</html>

<script>
    function validarSessao() {
        var nome = sessionStorage.NOME_USUARIO;
        b_usuario.innerHTML = nome;
    }

    window.onload = function () {
        exibirSeries();
        validarSessao();
    }

    function exibirSeries() {
        fetch(`/series/listarSerieFiccaoCientifica`).then(function (response) {
            if (response.ok) {
                response.json().then(function (resposta) {
                    console.log(`Séries recebidas: ${JSON.stringify(resposta)}`);
                    for (let i = 0; i < resposta.length; i++) {
                        avaliacoes.innerHTML += `
                            <div class="cardsAvaliacoes">
                                <div class="dentroCardAvaliacoes">
                                    <div class="imagemAvaliacao">
                                        <img src="${resposta[i].imagem}" alt="Imagem Série">    
                                    </div>
                                    
                                    <div class="informacoesUsuarioAvaliacoes">
                                        <h3>${resposta[i].nome_de_usuario}</h3>
                                        <h2>${resposta[i].nome_serie_avaliacao}</h2>
                                        <h4 class="avaliacaoDaSerie">${resposta[i].desc_avaliacao}</h4>
                                        <div class="notaSerie"><img src="../assets/image-removebg-preview.png" width="20px"> <p>${resposta[i].nota_serie}</p></div>   
                                    </div>
                                </div>
                            </div>

                            <hr class="divisaoAvaliacoes">
                        `;
                    }
                });
            } else {
                console.error('Nenhum dado encontrado ou erro na API');
            }
        })
            .catch(function (error) {
                console.error(`Erro na obtenção dos dados: ${error.message}`);
            });
    }
</script>
