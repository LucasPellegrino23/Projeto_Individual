<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeriesTV | Avaliar Séries</title>

    <link rel="stylesheet" href="../css/styleLogador.css">
    <script src="../js/sessao.js"></script>
    <script src="../js/alerta.js"></script>
</head>

<body onload="validarSessao()">
    <div class="containerPagina">
        <div class="navegacao">
            <div class="divLogo">
                <img src="../assets/logo.png" alt="Logo SeriesTv">
            </div>
            <h3 class="h3Ola">Olá, <span id="b_usuario"></span>!</h3>

            <div class="divLinks">
                <a class="links" href="./perfil.html"><button>Perfil do Usuário</button></a>
                <a href="./avaliarExistente.html" class="links"><button class="ative">Avaliar Séries
                        Existentes</button></a>
                <a class="links" href="./cadastrarSerie.html"><button>Cadastrar Séries</button></a>
                <a class="links" href="./dashboard.html"><button>Dashboard</button></a>
                <a class="links" href="./avaliacoesAcao.html"><button>Avaliações</button></a>
                <a class="links" href="./simulador.html"><button>Simulador de Séries</button></a>
                <h3 onclick="limparSessao()"><a href="../index.html">Sair</a></h3>
            </div>
        </div>

        <div class="formularioSerie">
            <div class="cadastroSerie">

                <div class="tituloSerie2">
                    <h1>Avalie uma série</h1>
                </div>

                <div class="inputSerie5">
                    <div class="inputBaseSerieNota">
                        <span>Nome da Série</span>
                        <input id="nome_serie_existente_input" type="text" placeholder="Nome série">
                        <span id="feedback_serie"></span>
                    </div>
                    <div class="buttonSerie">
                        <button onclick="buscarSerie()">Buscar Série</button>
                    </div>

                    <div id="avaliacaoSerieExistente">
                        <div class="inputAvaliacaoSerie">
                            <span>Avaliação</span>
                            <textarea id="avaliacao_input" type="text"
                                placeholder="Digite a avaliação da série"></textarea>
                        </div>
                        <div class="inputBaseSerieNota">
                            <span>Nota da Série</span>
                            <input id="nota_serie_input" type="number" placeholder="0.0">
                        </div>
                        <div class="buttonSerie">
                            <button onclick="avaliar()">Avaliar Série</button>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
</body>

</html>

<script>
    var idSerieEncontrada = null;

    document.getElementById("avaliacaoSerieExistente").style.display = "none";

    function validarSessao() {
        var nome = sessionStorage.NOME_USUARIO;
        b_usuario.innerHTML = nome;
    }

    function buscarSerie() {
        var nomeSerieVar = nome_serie_existente_input.value;

        if (nomeSerieVar == '') return;

        fetch("/series/buscarSeriePorNome", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ nomeSerieServer: nomeSerieVar }),
        })
            .then(function (resposta) {
                resposta.json().then(json => {
                    if (json.encontrado) {
                        idSerieEncontrada = json.id_serie;
                        feedback_serie.innerHTML = `Série "${json.nome_serie}" encontrada!`;
                        feedback_serie.style.color = "green";
                    } else {
                        idSerieEncontrada = null;
                        feedback_serie.innerHTML = `Série não encontrada, cadastre e avalie!`;
                        feedback_serie.style.color = "red";
                    }
                });
            })
            .catch(erro => console.log("#ERRO:", erro));
            
            document.getElementById("avaliacaoSerieExistente").style.display = "block";
    }

    function avaliar() {
        var avaliacaoVar = avaliacao_input.value;
        var notaVar = nota_serie_input.value;
        var idUsuarioVar = sessionStorage.ID_USUARIO;
        var nomeSerieVar = nome_serie_existente_input.value;

        if (idSerieEncontrada == null) {
            alert("Busque uma série válida antes de avalia-lá!");
            return;
        }

        if (avaliacaoVar !== '' && notaVar !== '') {
            fetch("/series/avaliarSerie", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    avaliacaoServer: avaliacaoVar,
                    notaServer: notaVar,
                    idUsuarioServer: idUsuarioVar,
                    fkSerieServer: idSerieEncontrada,
                    nomeDaSerieServer: nomeSerieVar
                }),
            })
                .then(function (resposta) {
                    if (resposta.ok) {
                        alert("Avaliação realizada com sucesso! Redirecionando para a tela da dashboard...");
                        setTimeout(() => { window.location = "dashboard.html"; }, 500);
                    } else {
                        throw "Erro ao avaliar a série existente!";
                    }
                })
                .catch(erro => console.log("#ERRO:", erro));

            return false;
        }
    }

</script>
