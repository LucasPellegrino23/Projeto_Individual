<!DOCTYPE html>
<html lang="pt-br">

<head>
    <link rel="shortcut icon" href="../assets/icon/favicon2.ico" type="image/x-icon">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeriesTv | Dashboards</title>

    <link rel="stylesheet" href="../css/styleLogador.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../js/sessao.js"></script>
    <script src="../js/alerta.js"></script>

<body
    onload="validarSessao(); obterDadosGrafico(); obterDadosGrafico2(); puxarKpiMaior(), puxarKpiMenor(), puxarKpiMaisAvaliacoes()">

    <div class="containerPagina">
        <div class="navegacao">
            <div class="divLogo">
                <img src="../assets/logo.png" alt="Logo SeriesTv">
            </div>
            <h3 class="h3Ola">Olá, <span id="b_usuario"></span>!</h3>

            <div class="divLinks">
                <a class="links" href="./perfil.html"><button>Perfil do Usuário</button></a>
                <a href="./avaliarExistente.html" class="links"><button>Avaliar Séries Existentes</button></a>
                <a class="links" href="./cadastrarSerie.html"><button>Cadastrar Séries</button></a>
                <a class="links" href="./dashboard.html"><button class="ative">Dashboard</button></a>
                <a class="links" href="./avaliacoesAcao.html"><button>Avaliações</button></a>
                <a class="links" href="./simulador.html"><button>Simulador de Séries</button></a>
                <h3 onclick="limparSessao()"><a href="../index.html">Sair</a></h3>
            </div>
        </div>

        <div class="dashboard">
            <div class="tituloDashboard">
                <h1>Dashboard das <br> séries avaliadas pelo público</h1>
            </div>
            <div class="kpis">
                <div class="kpi1">
                    <h3 class="tituloKpi">Série <span class="descKpi">mais avaliadas</span></h3>

                    <h4 class="serieKpi" id="serieMaisAvaliada"></h4>
                </div>
                <div class="kpi2">
                    <h3 class="tituloKpi">Série <span class="descKpi">mais bem avaliada</span></h3>

                    <h4 class="serieKpi" id="serieMaisBemAvaliada"></h4>
                </div>
                <div class="kpi3">
                    <h3 class="tituloKpi">Série <span class="descKpi">mais rejeitada</span></h3>

                    <h4 class="serieKpi" id="serieMenosAvaliada"></span></h4>
                </div>
            </div>

            <div class="grafico">
                <h3>Gêneros com mais avaliações</h3>
                <canvas class="graficoJs" id="myChart"></canvas>
            </div>

            <div class="grafico">
                <h3>Séries de cada gênero com mais avaliações</h3>
                <canvas class="graficoJs2" id="myChart2"></canvas>
            </div>
        </div>
    </div>
    </div>
</body>

</html>

<script>

    function validarSessao() {
        var nome = sessionStorage.NOME_USUARIO;
        b_usuario.innerHTML = nome;
    }

    function puxarKpiMaisAvaliacoes() {
        fetch(`/series/kpiMaisAvaliada`).then(function (response) {
            if (response.ok) {
                response.json().then(function (resposta) {
                    console.log(`Dados KPI recebidas: ${JSON.stringify(resposta)}`);
                    for (let i = 0; i < resposta.length; i++) {
                        serieMaisAvaliada.innerHTML += `
                            ${resposta[i].nome_serie_avaliacao} - Quantidade de Avaliações: <span class="notaKpi">${resposta[i].quantidade_avaliacoes}</span>
                        `;
                    }
                });
            } else {
                console.error('Nenhum dado encontrado ou erro na API');
            }
        })
            .catch(function (error) {
                console.error(`Erro na obtenção dos dados: ${error.message}`);
            });
    }

    function puxarKpiMaior() {
        fetch(`/series/kpiMaisBemAvaliada`).then(function (response) {
            if (response.ok) {
                response.json().then(function (resposta) {
                    console.log(`Dados KPI recebidas: ${JSON.stringify(resposta)}`);
                    for (let i = 0; i < resposta.length; i++) {
                        serieMaisBemAvaliada.innerHTML += `
                            ${resposta[i].nome_serie_avaliacao} - Média das notas: <span class="notaKpi">${resposta[i].media_notas}</span>
                        `;
                    }
                });
            } else {
                console.error('Nenhum dado encontrado ou erro na API');
            }
        })
            .catch(function (error) {
                console.error(`Erro na obtenção dos dados: ${error.message}`);
            });
    }

    function puxarKpiMenor() {
        fetch(`/series/kpiMenosAvaliada`).then(function (response) {
            if (response.ok) {
                response.json().then(function (resposta) {
                    console.log(`Dados KPI recebidas: ${JSON.stringify(resposta)}`);
                    for (let i = 0; i < resposta.length; i++) {
                        serieMenosAvaliada.innerHTML += `
                            ${resposta[i].nome_serie_avaliacao} - Média das notas: <span class="notaKpi">${resposta[i].media_notas}</span>
                        `;
                    }
                });
            } else {
                console.error('Nenhum dado encontrado ou erro na API');
            }
        })
            .catch(function (error) {
                console.error(`Erro na obtenção dos dados: ${error.message}`);
            });
    }

    function obterDadosGrafico() {
        fetch(`/series/buscarGenero`).then(function (response) {
            if (response.ok) {
                response.json().then(function (resposta) {
                    console.log(`Dados recebidos: ${JSON.stringify(resposta)}`);
                    resposta.reverse();

                    plotarGrafico(resposta);

                });
            } else {
                console.error('Nenhum dado encontrado ou erro na API');
            }
        })
            .catch(function (error) {
                console.error(`Erro na obtenção dos dados p/ gráfico: ${error.message}`);
            });
    }

    function plotarGrafico(resposta) {

        console.log('iniciando plotagem do gráfico...');

        let labels = [];

        let dados = {
            labels: labels,
            datasets: [{
                label: 'Quantidade de avaliações',
                backgroundColor: '#037eeb',
                borderColor: '#0d2c82',
                data: [],
            },
            ]
        };

        console.log('----------------------------------------------')
        console.log('Estes dados foram recebidos pela funcao "obterDadosGrafico" e passados para "plotarGrafico":')
        console.log(resposta)

        for (i = 0; i < resposta.length; i++) {
            var registro = resposta[i];
            labels.push(registro.genero);//lista laabels
            dados.datasets[0].data.push(registro.qtd_avaliacao);
        }

        console.log('----------------------------------------------')
        console.log('O gráfico será plotado com os respectivos valores:')
        console.log('Labels:')
        console.log(labels)
        console.log('Dados:')
        console.log(dados.datasets)
        console.log('----------------------------------------------')

        const config = {
            type: 'bar',
            data: dados,
            options: {
                scales: {
                    x: {
                        ticks: {
                            color: '#FF0000' // Cor vermelha para o eixo X
                        }
                    },
                    y: {
                        ticks: {
                            color: '#0000FF' // Cor azul para o eixo Y
                        }
                    }
                }
            }
        }
    };

    const myChart = new Chart(
        document.getElementById('myChart'),
        config
    );    

    function obterDadosGrafico2() {
        fetch(`/series/buscarAvaliacao`).then(function (response) {
            if (response.ok) {
                response.json().then(function (resposta) {
                    console.log(`Dados recebidos: ${JSON.stringify(resposta)}`);
                    resposta.reverse();

                    plotarGrafico2(resposta);

                });
            } else {
                console.error('Nenhum dado encontrado ou erro na API');
            }
        })
            .catch(function (error) {
                console.error(`Erro na obtenção dos dados p/ gráfico: ${error.message}`);
            });
    }

    function plotarGrafico2(resposta) {

        console.log('iniciando plotagem do gráfico...');

        let labels = [];

        let dados = {
            labels: labels,
            datasets: [{
                label: 'Avaliações',
                backgroundColor: '#037eeb',
                borderColor: '#0d2c82',
                data: [],
            },
            ]
        };

        console.log('----------------------------------------------')
        console.log('Estes dados foram recebidos pela funcao "obterDadosGrafico" e passados para "plotarGrafico":')
        console.log(resposta)

        for (i = 0; i < resposta.length; i++) {
            var registro = resposta[i];
            labels.push(registro.nome_serie_avaliacao);//lista laabels
            dados.datasets[0].data.push(registro.qtd_avaliacao);
        }

        console.log('----------------------------------------------')
        console.log('O gráfico será plotado com os respectivos valores:')
        console.log('Labels:')
        console.log(labels)
        console.log('Dados:')
        console.log(dados.datasets)
        console.log('----------------------------------------------')

        const config = {
            type: 'bar',
            data: dados,
            options: {}
        };

        const myChart = new Chart(
            document.getElementById('myChart2'),
            config
        );
    }
</script>
