<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SeriesTV | Simulador</title>

    <script src="./js/sessao.js"></script>

    <link rel="stylesheet" href="./css/estilo.css">
    <link rel="icon" href="./assets/icon/favicon2.ico">
    <link rel="preconnect" href="https://fonts.gstatic.com">
</head>

<body>

    <header>
        <nav class="nav">
            <div class="divLogo">
                <img src="./assets/logo.png" alt="Logo" width="70px" height="75x">
            </div>
            <div class="divLinks">
                <ul>
                    <li><a href="./index.html">Home</a></li>
                    <li><a href="./index.html#sobre">Sobre</a></li>
                    <li><a href="./index.html#sobreMim">Sobre Mim</a></li>
                    <li><a href="./simulador.html"><button class="buttonBanner">Simulador</button></a></li>
                    <li><a href="./cadastro.html"><img src="./assets/login.png" alt="Login" width="40px"></a></li>
                </ul>
            </div>
        </nav>
    </header>

    <div class="containerSimulador">
            <div class="simulacao">
                <h1>Simulador de Séries</h1>
                <hr>

                <div class="divInputsSimulador">
                    <h3>Nome Série:</h3>
                    <input type="text" id="ipt_nome_serie">
                </div>
                <div class="divInputsSimulador">
                    <h3>Quantidade de Episódios:</h3>
                    <input type="text" id="ipt_qtd_eps">
                </div>
                <div class="divInputsSimulador">
                    <h3>Tempo Médio dos Episódios (em minutos):</h3>
                    <input type="text" id="ipt_tempo_medio_eps">
                </div>
                <div class="divInputsSimulador">
                    <h3>Em quantas semanas você quer terminar a série:</h3>
                    <input type="text" id="ipt_qtd_semanas">
                </div>

                <button onclick="simular()">Simular</button>

                <div id="div_msg"></div>
            </div>

            <p>Vale Ressaltar que esse simulador, não é 100% preciso, <br> sendo uma previsão de tempo</p>
        </div>
    </div>
</body>

</html>
<script>


    function simular(){
        let nomeSerie = ipt_nome_serie.value;
        let qtdEpisodios = Number(ipt_qtd_eps.value);
        let tempoMedio = Number(ipt_tempo_medio_eps.value);
        let qtdSemanas = Number(ipt_qtd_semanas.value);

        let totalMinutos = qtdEpisodios * tempoMedio;

        let totalMinutosSemanas = (totalMinutos / qtdSemanas);

        let totalMinutosDia = totalMinutosSemanas / 7;

        let totalEpsDia = totalMinutosDia / tempoMedio;

        div_msg.innerHTML = `Você tem que assitir aproximadamente <span class="span_msg">${totalEpsDia.toFixed(2)}</span> episódio(s) por dia para terminar em <span class="span_msg">${qtdSemanas}</span> semanas`;
    }
</script>
